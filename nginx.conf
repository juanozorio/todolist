server {
  listen 80;
  server_name localhost;

  location /todolist/ {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ /todolist/index.html;
  }

  location = / {
    return 301 /todolist/;
  }

  location /todolist/assets/ {
    alias /usr/share/nginx/html/assets/;
    access_log off;
    expires 1y;
    add_header Cache-Control "public";
  }
}
